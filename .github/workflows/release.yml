name: Release Builds
on: push
env:
  LLVM_VERSION: "22.1.2"
  QT_VERSION: "6.10.2-msvc"
  LIBSBML_VERSION: "v5.20.5"
  LIBEXPAT_VERSION: "R_2_7_3"
  SYMENGINE_VERSION: "add_metalcode_printer"
  GMP_VERSION: "6.3.0"
  MPFR_VERSION: "4.2.1"
  MPIR_MSVC_VERSION: "f84ce09218b91d4c4fdf26e75093918c9fdb7046"
  MPFR_MSVC_VERSION: "f32587226978185abf3df725edbd79da985c7e8c"
  SPDLOG_VERSION: "v1.15.3"
  LIBTIFF_VERSION: "v4.7.1"
  FMT_VERSION: "12.0.0"
  TBB_VERSION: "v2022.2.0"
  DPL_VERSION: "oneDPL-2022.9.0-release"
  OPENCV_VERSION: "4.12.0"
  CATCH2_VERSION: "v3.10.0"
  BENCHMARK_VERSION: "v1.9.4"
  CGAL_VERSION: "v6.0.2"
  BOOST_VERSION: "1.89.0"
  BOOST_VERSION_: "1_89_0"
  QCUSTOMPLOT_VERSION: "2.1.1"
  CEREAL_VERSION: "v1.3.2"
  PAGMO_VERSION: "v2.19.1"
  BZIP2_VERSION: "bzip2-1.0.8"
  ZIPPER_VERSION: "master"
  COMBINE_VERSION: "master"
  FUNCTION2_VERSION: "4.2.5"
  VTK_VERSION: "fix_19533_msvc_vtkdiy2_compilation_error"
  SCOTCH_VERSION: "v7.0.9"
  NLOPT_VERSION: "v2.10.0"
  CUDA_REDIST_VERSION: "13.2.51"
  METALCPP_VERSION: "macOS14.2_iOS17.2"
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "ubuntu-22.04"
            BOOST_INSTALL_PREFIX: "/opt/smelibs"
            BOOST_BOOTSTRAP_OPTIONS: "--with-toolset=clang"
            BOOST_B2_OPTIONS: "cxxflags=-fPIC"
            TBB_ENABLE_IPO: "ON"
          - os: "ubuntu-22.04"
            BOOST_INSTALL_PREFIX: "/opt/smelibs"
            BOOST_BOOTSTRAP_OPTIONS: "--with-toolset=clang"
            BOOST_B2_OPTIONS: "cxxflags=-fPIC"
            TBB_ENABLE_IPO: "ON"
            TBB_SANITIZE: "thread"
            BUILD_TAG: "_tsan"
          - os: "ubuntu-22.04-arm"
            BOOST_INSTALL_PREFIX: "/opt/smelibs"
            BOOST_BOOTSTRAP_OPTIONS: "--with-toolset=clang"
            BOOST_B2_OPTIONS: "cxxflags=-fPIC"
            TBB_ENABLE_IPO: "ON"
          - os: "macos-14"
            BOOST_INSTALL_PREFIX: "/opt/smelibs"
            BOOST_B2_OPTIONS: 'cxxflags="-mmacosx-version-min=11" linkflags="-mmacosx-version-min=11"'
            TBB_ENABLE_IPO: "ON"
          - os: "windows-2022"
            BOOST_INSTALL_PREFIX: "c:/smelibs"
            BOOST_B2_OPTIONS: "address-model=64"
            TBB_ENABLE_IPO: "ON"
          - os: "windows-11-arm"
            BOOST_INSTALL_PREFIX: "c:/smelibs"
            BOOST_B2_OPTIONS: "address-model=64 architecture=arm"
            TBB_ENABLE_IPO: "ON"
    env:
      BOOST_INSTALL_PREFIX: ${{ matrix.BOOST_INSTALL_PREFIX }}
      BOOST_BOOTSTRAP_OPTIONS: ${{ matrix.BOOST_BOOTSTRAP_OPTIONS }}
      BOOST_B2_OPTIONS: ${{ matrix.BOOST_B2_OPTIONS }}
      TBB_ENABLE_IPO: ${{ matrix.TBB_ENABLE_IPO }}
      TBB_SANITIZE: ${{ matrix.TBB_SANITIZE }}
      BUILD_TAG: ${{ matrix.BUILD_TAG }}
    steps:
      - uses: spatial-model-editor/setup-ci@2026.03.30
        with:
          sme_deps_llvm: ${{ env.LLVM_VERSION }}
          sme_deps_qt: ${{ env.QT_VERSION }}
          build_tag: ${{ matrix.BUILD_TAG }}
          cache_id: ${{ matrix.BUILD_TAG }}
      - uses: actions/checkout@v6
      - name: Build script
        if: runner.os != 'Windows'
        run: ./build.sh
      - name: Build script
        if: runner.os == 'Windows'
        run: ./build.ps1
      - uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.os }}${{ matrix.BUILD_TAG }}
          path: ./artefacts/*
          retention-days: 3
  release:
    name: Upload Binaries to GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    # upload binaries to github release if commit is tagged
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          repo: spatial-model-editor/sme_deps_common
          keep_latest: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: binaries
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: binaries/*
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
